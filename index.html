<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>42ndWorldview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>42ndWorldview</h1>
      <p class="subtitle">Text-dump worldview workspace with JSON-only LLM output flow.</p>
    </div>
    <div class="header-actions">
      <button id="resetBtn" class="danger">Reset</button>
      <button id="exportProfileBtn">Export Profile</button>
      <label class="file-btn">Import Profile<input id="importProfileInput" type="file" accept=".json" hidden /></label>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-header">
        <h2>1) Profile JSON (editable + live)</h2>
        <button id="copyProfileBtn">Copy JSON</button>
      </div>
      <textarea id="profileBox" spellcheck="false"></textarea>
      <p id="profileStatus" class="hint">Paste strict JSON directly from an LLM. Valid JSON updates profile state immediately.</p>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>2) Scenario / Text Dump</h2>
        <div class="row">
          <button id="loadExampleBtn">Load Example</button>
          <button id="copyPromptBtn">Copy LLM Prompt</button>
        </div>
      </div>
      <textarea id="scenarioBox" class="short" spellcheck="false" placeholder="Paste any scenario or online ramble here."></textarea>
      <label class="label">LLM JSON Primer (JSON-only enforced)</label>
      <textarea id="promptBox" spellcheck="false" readonly></textarea>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>3) Compare Another Profile</h2>
        <div class="row">
          <label class="file-btn">Import Compare<input id="importCompareInput" type="file" accept=".json" hidden /></label>
          <button id="compareBtn">Compare</button>
        </div>
      </div>
      <textarea id="compareBox" spellcheck="false" placeholder="Paste second profile JSON here."></textarea>
      <div id="diffMeta" class="hint"></div>
      <pre id="diffBox" class="diff-output"></pre>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>4) Visualizer</h2>
      </div>
      <div id="visualizer" class="visualizer"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
